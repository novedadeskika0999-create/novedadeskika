auth.onAuthStateChanged(async (user) => {
    if (!user) {
        document.getElementById('msg').textContent = '🔐 Iniciando sesión...';
        const provider = new firebase.auth.GoogleAuthProvider();
        try { await auth.signInWithPopup(provider); } catch(e) { document.getElementById('msg').textContent = '❌ Error: ' + e.message; }
        return;
    }
    
    document.getElementById('msg').textContent = '⏳ Subiendo datos a Firebase...';
    document.getElementById('sub').textContent = compras.length + ' compras y ' + logistica.length + ' productos';
    
    try {
        await db.collection('datos').doc('principal').set({
            compras,
            logistica,
            inversionExtras: 0,

        document.getElementById('msg').textContent = '✅ ' + compras.length + ' compras y ' + logistica.length + ' productos subidos';
        document.getElementById('sub').textContent = 'Redirigiendo a la app...';

    } catch(e) {

    }
});
